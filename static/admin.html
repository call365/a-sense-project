<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A-Sense 관리자 페이지</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
    .wrap { max-width: 760px; margin: 80px auto; padding: 24px; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 16px; padding: 24px; }
    h1 { margin: 0 0 12px; color: #60a5fa; }
    p { color: #cbd5e1; line-height: 1.7; }
    .btns { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
    .btn { text-decoration: none; padding: 12px 16px; border-radius: 10px; font-weight: 700; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-outline { border: 1px solid #334155; color: #e2e8f0; }
    code { background: #1e293b; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>👑 A-Sense 관리자 페이지</h1>
      <p>
        관리자 페이지는 Streamlit으로 운영됩니다. 아래 버튼으로 관리자 센터를 열어
        <strong>정산 대기(Pending)</strong>를 <strong>완료(Completed)</strong> 처리하세요.
      </p>
      <p>
        기본 실행 경로: <code>streamlit run dashboard_app/admin.py</code>
      </p>
      <div class="btns">
        <a class="btn btn-primary" href="https://share.streamlit.io" target="_blank" rel="noopener">Streamlit Cloud 열기</a>
        <a class="btn btn-outline" href="dashboard.html">퍼블리셔 대시보드</a>
        <a class="btn btn-outline" href="/home_ko">홈으로</a>
      </div>
    </div>
  </div>
</body>
</html>
