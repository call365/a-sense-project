<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Sense API 발급 센터 | Coze 봇 수익화</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-slate-100 p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-600 mb-2">A-Sense</h1>
            <p class="text-slate-500 font-medium">Coze 플러그인 전용 API 키 발급</p>
        </div>

        <div id="form-section">
            <p class="text-sm text-slate-600 mb-6 text-center leading-relaxed">
                당신의 AI 봇에 맥락 맞춤형 네이티브 광고를 달고<br>오늘부터 바로 수익을 창출하세요.
            </p>

            <form id="signup-form" class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-bold text-slate-700 mb-1">이메일 주소 <span class="text-red-500">*</span></label>
                    <input type="email" id="email" required placeholder="hello@example.com"
                           class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>

                <button type="submit" id="submit-btn"
                        class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-xl transition flex justify-center items-center gap-2">
                    <i data-lucide="key"></i> API 키 즉시 발급받기
                </button>
            </form>
        </div>

        <div id="result-section" class="hidden text-center">
            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="check-circle" class="w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-900 mb-2">발급 완료!</h2>
            <p class="text-sm text-slate-500 mb-6">아래 API 키를 복사하여 Coze 플러그인 인증 화면에 붙여넣으세요.</p>

            <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 flex items-center justify-between mb-6">
                <code id="api-key-display" class="text-sm font-mono text-slate-800 break-all select-all"></code>
            </div>

            <button onclick="copyApiKey()" id="copy-btn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition flex justify-center items-center gap-2">
                <i data-lucide="copy"></i> 키 복사하기
            </button>

            <p class="mt-4 text-xs text-slate-400">이 창을 닫으면 키를 다시 확인할 수 없습니다.<br>반드시 안전한 곳에 복사해 두세요.</p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submit-btn');

            submitBtn.innerHTML = '<i data-lucide="loader-2" class="animate-spin"></i> 발급 중...';
            submitBtn.disabled = true;
            lucide.createIcons();

            try {
                const API_URL = `${window.location.origin}/api/v1/quick-signup`;

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok && data.api_key) {
                    document.getElementById('form-section').classList.add('hidden');
                    document.getElementById('result-section').classList.remove('hidden');
                    document.getElementById('api-key-display').innerText = data.api_key;
                } else {
                    alert('발급에 실패했습니다: ' + (data.detail || '알 수 없는 오류'));
                    resetBtn();
                }
            } catch (error) {
                console.error('Error:', error);
                alert('서버와 통신할 수 없습니다.');
                resetBtn();
            }
        });

        function resetBtn() {
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.innerHTML = '<i data-lucide="key"></i> API 키 즉시 발급받기';
            submitBtn.disabled = false;
            lucide.createIcons();
        }

        function copyApiKey() {
            const apiKey = document.getElementById('api-key-display').innerText;
            navigator.clipboard.writeText(apiKey).then(() => {
                const copyBtn = document.getElementById('copy-btn');
                copyBtn.innerHTML = '<i data-lucide="check"></i> 복사 완료!';
                copyBtn.classList.replace('bg-blue-600', 'bg-green-600');
                copyBtn.classList.replace('hover:bg-blue-700', 'hover:bg-green-700');
                lucide.createIcons();

                setTimeout(() => {
                    copyBtn.innerHTML = '<i data-lucide="copy"></i> 키 복사하기';
                    copyBtn.classList.replace('bg-green-600', 'bg-blue-600');
                    copyBtn.classList.replace('hover:bg-green-700', 'hover:bg-blue-700');
                    lucide.createIcons();
                }, 2000);
            });
        }
    </script>
</body>
</html>
